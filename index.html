<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Prompts</title>
<style>
  :root {
    --primary: #0F6E56;
    --primary-light: #E1F5EE;
    --primary-mid: #1D9E75;
    --accent: #185FA5;
    --accent-light: #E6F1FB;
    --text: #1a1a1a;
    --text-muted: #5F5E5A;
    --border: rgba(0,0,0,0.10);
    --surface: #ffffff;
    --surface-alt: #f7f8f6;
    --tag-bg: #E1F5EE;
    --tag-text: #0F6E56;
    --danger: #A32D2D;
    --danger-light: #FCEBEB;
    --radius: 10px;
    --shadow: 0 2px 8px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--surface-alt);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--primary);
    color: #fff;
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.3px; }
  header p { font-size: 0.85rem; opacity: 0.8; margin-top: 2px; }

  .btn-primary {
    background: #fff;
    color: var(--primary);
    border: none;
    padding: 0.55rem 1.1rem;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn-primary:hover { opacity: 0.85; }

  .toolbar {
    padding: 1.2rem 2rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .search-wrap { flex: 1; min-width: 220px; position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .search-wrap input {
    width: 100%;
    padding: 0.55rem 0.75rem 0.55rem 2.2rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 0.9rem;
    background: var(--surface-alt);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--primary-mid); }

  select {
    padding: 0.55rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 0.9rem;
    background: var(--surface-alt);
    color: var(--text);
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--primary-mid); }

  .counter { font-size: 0.82rem; color: var(--text-muted); margin-left: auto; white-space: nowrap; }

  .btn-refresh {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.5rem 0.7rem;
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    transition: background 0.12s;
  }
  .btn-refresh:hover { background: var(--surface-alt); }
  .btn-refresh.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.1rem;
    padding: 1.5rem 2rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    box-shadow: var(--shadow);
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.11); transform: translateY(-1px); }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
  .card-title { font-weight: 600; font-size: 0.95rem; color: var(--text); line-height: 1.3; }

  .tag {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .card-desc { font-size: 0.84rem; color: var(--text-muted); line-height: 1.5; }

  .card-prompt {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-left: 3px solid var(--primary-mid);
    border-radius: 6px;
    padding: 0.7rem 0.9rem;
    font-size: 0.82rem;
    color: #333;
    line-height: 1.55;
    max-height: 120px;
    overflow-y: auto;
    font-family: 'Courier New', monospace;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-top: 0.2rem; }
  .card-author { font-size: 0.75rem; color: var(--text-muted); }
  .card-actions { display: flex; gap: 0.4rem; }

  .btn-copy, .btn-delete {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.65rem;
    font-size: 0.78rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.12s, color 0.12s;
    font-weight: 500;
  }
  .btn-copy { background: var(--accent-light); color: var(--accent); border-color: #b5d4f4; }
  .btn-copy:hover { background: #d0e7f9; }
  .btn-delete { background: var(--danger-light); color: var(--danger); border-color: #f7c1c1; }
  .btn-delete:hover { background: #f9d5d5; }

  .empty { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--text-muted); font-size: 0.95rem; }

  .status-bar {
    display: none;
    padding: 0.6rem 2rem;
    font-size: 0.83rem;
    font-weight: 500;
    align-items: center;
    gap: 8px;
  }
  .status-bar.show { display: flex; }
  .status-bar.loading { background: #fff8e1; color: #856404; }
  .status-bar.success { background: #e1f5ee; color: #0F6E56; }
  .status-bar.error { background: var(--danger-light); color: var(--danger); }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 1.8rem;
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin: 1rem;
  }
  .modal h2 { font-size: 1.15rem; font-weight: 600; }

  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 0.83rem; font-weight: 600; color: var(--text-muted); }
  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 0.55rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: inherit;
    color: var(--text);
    background: var(--surface-alt);
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--primary-mid); }

  .modal-footer { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 0.4rem; }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 1.1rem;
    font-size: 0.9rem;
    cursor: pointer;
    color: var(--text-muted);
    transition: background 0.12s;
  }
  .btn-cancel:hover { background: var(--surface-alt); }

  .btn-save {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.55rem 1.3rem;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.88; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg { font-size: 0.8rem; color: var(--danger); display: none; margin-top: 2px; }

  @media (max-width: 600px) {
    header, .toolbar, .grid { padding: 1rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📚 Catálogo de Prompts</h1>
    <p>Repositório compartilhado do time — copie, use e contribua</p>
  </div>
  <button class="btn-primary" onclick="openModal()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Novo Prompt
  </button>
</header>

<div class="status-bar" id="status-bar">
  <span id="status-msg"></span>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar por título, descrição ou prompt..." oninput="renderCards()">
  </div>
  <select id="filter-cat" onchange="renderCards()">
    <option value="">Todas as categorias</option>
  </select>
  <select id="filter-author" onchange="renderCards()">
    <option value="">Todos os autores</option>
  </select>
  <button class="btn-refresh" id="btn-refresh" onclick="loadPrompts()" title="Atualizar">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
  </button>
  <span class="counter" id="counter"></span>
</div>

<div class="grid" id="grid">
  <div class="empty">Carregando prompts...</div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>Adicionar novo prompt</h2>

    <div class="form-group">
      <label>Título do Prompt *</label>
      <input type="text" id="f-title" placeholder="Ex: Resumo executivo de reunião">
      <span class="error-msg" id="err-title">Campo obrigatório</span>
    </div>

    <div class="form-group">
      <label>Categoria *</label>
      <select id="f-cat">
        <option value="">Selecione...</option>
        <option>Vendas</option>
        <option>Customer Success</option>
        <option>Marketing</option>
        <option>Operações</option>
        <option>Produtividade</option>
        <option>Comunicação</option>
        <option>Análise de Dados</option>
        <option>Outro</option>
      </select>
      <span class="error-msg" id="err-cat">Campo obrigatório</span>
    </div>

    <div class="form-group">
      <label>O que esse prompt faz? *</label>
      <input type="text" id="f-desc" placeholder="Ex: Gera resumo executivo com próximos passos e decisões">
      <span class="error-msg" id="err-desc">Campo obrigatório</span>
    </div>

    <div class="form-group">
      <label>Prompt completo *</label>
      <textarea id="f-prompt" rows="6" placeholder="Cole aqui o prompt que deve ser usado..."></textarea>
      <span class="error-msg" id="err-prompt">Campo obrigatório</span>
    </div>

    <div class="form-group">
      <label>Seu nome *</label>
      <input type="text" id="f-author" placeholder="Ex: Guilherme">
      <span class="error-msg" id="err-author">Campo obrigatório</span>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="savePrompt()">Salvar Prompt</button>
    </div>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRX4RstJNINWe6VXT7PuKEueobTK1iznULqusCwTK0UUENePwPq-tQ15_MYGFZWpiFvImRPBN1Ehr0j/pub?gid=0&single=true&output=csv";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYYKLWqwWt6CDo-Jl2GtSKi80X5W7_ha_id6svG65zl-tnbbWUtkT6iLMpcaO-EKuTBw/exec";

let prompts = [];

function showStatus(msg, type) {
  const bar = document.getElementById("status-bar");
  bar.className = "status-bar show " + type;
  document.getElementById("status-msg").textContent = msg;
  if (type === "success") setTimeout(() => bar.classList.remove("show"), 3000);
}

function parseCSV(text) {
  const rows = splitCSVRows(text.trim());
  if (rows.length < 2) return [];
  return rows.slice(1).map((cols, idx) => ({
    uid:         (cols[6] || "").trim() || ("row_" + idx),
    title:       (cols[0] || "").trim(),
    category:    (cols[1] || "").trim(),
    description: (cols[2] || "").trim(),
    prompt:      (cols[3] || "").trim(),
    author:      (cols[4] || "").trim(),
    date:        (cols[5] || "").trim()
  })).filter(p => p.title);
}

function splitCSVRows(text) {
  const rows = [];
  let cols = [], cur = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const next = text[i + 1];
    if (c === '"') {
      if (inQ && next === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      cols.push(cur); cur = "";
    } else if ((c === '\n' || (c === '\r' && next === '\n')) && !inQ) {
      if (c === '\r') i++;
      cols.push(cur); cur = "";
      rows.push(cols); cols = [];
    } else {
      cur += c;
    }
  }
  cols.push(cur);
  if (cols.some(c => c.trim())) rows.push(cols);
  return rows;
}

async function loadPrompts() {
  const btn = document.getElementById("btn-refresh");
  btn.classList.add("spinning");
  showStatus("Carregando prompts...", "loading");
  try {
    const resp = await fetch(CSV_URL + "&t=" + Date.now());
    const text = await resp.text();
    prompts = parseCSV(text);
    updateFilters();
    renderCards();
    showStatus("Prompts atualizados com sucesso.", "success");
  } catch(e) {
    showStatus("Erro ao carregar. Verifique a conexão.", "error");
    document.getElementById("grid").innerHTML = '<div class="empty">Não foi possível carregar os prompts. Tente novamente.</div>';
  } finally {
    btn.classList.remove("spinning");
  }
}

function updateFilters() {
  const cats = [...new Set(prompts.map(p => p.category).filter(Boolean))].sort();
  const authors = [...new Set(prompts.map(p => p.author).filter(Boolean))].sort();
  const fc = document.getElementById("filter-cat");
  const fa = document.getElementById("filter-author");
  const sc = fc.value, sa = fa.value;
  fc.innerHTML = '<option value="">Todas as categorias</option>' + cats.map(c => `<option ${c===sc?'selected':''}>${escHtml(c)}</option>`).join('');
  fa.innerHTML = '<option value="">Todos os autores</option>' + authors.map(a => `<option ${a===sa?'selected':''}>${escHtml(a)}</option>`).join('');
}

function renderCards() {
  const q = document.getElementById("search").value.toLowerCase();
  const cat = document.getElementById("filter-cat").value;
  const author = document.getElementById("filter-author").value;

  const filtered = prompts.filter(p => {
    const mQ = !q || [p.title, p.description, p.prompt, p.author, p.category].some(f => f && f.toLowerCase().includes(q));
    const mC = !cat || p.category === cat;
    const mA = !author || p.author === author;
    return mQ && mC && mA;
  });

  document.getElementById("counter").textContent = `${filtered.length} prompt${filtered.length !== 1 ? 's' : ''} encontrado${filtered.length !== 1 ? 's' : ''}`;

  const grid = document.getElementById("grid");
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">Nenhum prompt encontrado. Tente outra busca ou <strong>adicione o primeiro!</strong></div>';
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${escHtml(p.title)}</div>
        <span class="tag">${escHtml(p.category)}</span>
      </div>
      <div class="card-desc">${escHtml(p.description)}</div>
      <div class="card-prompt">${escHtml(p.prompt)}</div>
      <div class="card-footer">
        <span class="card-author">por ${escHtml(p.author)} · ${escHtml(p.date)}</span>
        <div class="card-actions">
          <button class="btn-copy" onclick="copyPrompt('${escHtml(p.uid)}', this)">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Copiar
          </button>
          <button class="btn-delete" onclick="deletePrompt('${escHtml(p.uid)}')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Excluir
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function copyPrompt(id, btn) {
  const p = prompts.find(x => x.uid === id);
  if (!p) return;
  navigator.clipboard.writeText(p.prompt).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Copiado!';
    btn.style.background = '#d1fae5';
    btn.style.color = '#065f46';
    setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; btn.style.color = ''; }, 1800);
  });
}

function openModal() {
  ["title","cat","desc","prompt","author"].forEach(f => {
    const el = document.getElementById("f-" + f);
    if (el.tagName === "SELECT") el.value = "";
    else el.value = "";
    document.getElementById("err-" + f).style.display = "none";
  });
  document.getElementById("overlay").classList.add("open");
}

function closeModal() { document.getElementById("overlay").classList.remove("open"); }
function closeModalOutside(e) { if (e.target === document.getElementById("overlay")) closeModal(); }

async function savePrompt() {
  const fields = [
    { id: "f-title", err: "err-title", key: "titulo" },
    { id: "f-cat",   err: "err-cat",   key: "categoria" },
    { id: "f-desc",  err: "err-desc",  key: "descricao" },
    { id: "f-prompt",err: "err-prompt",key: "prompt" },
    { id: "f-author",err: "err-author",key: "autor" }
  ];

  let valid = true;
  const item = { action: "add" };
  fields.forEach(f => {
    const val = document.getElementById(f.id).value.trim();
    const errEl = document.getElementById(f.err);
    if (!val) { errEl.style.display = "block"; valid = false; }
    else { errEl.style.display = "none"; item[f.key] = val; }
  });
  if (!valid) return;

  const btn = document.getElementById("btn-save");
  btn.disabled = true;
  btn.textContent = "Salvando...";
  showStatus("Salvando prompt na planilha...", "loading");

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(item)
    });
    closeModal();
    showStatus("Prompt salvo! Atualizando lista...", "loading");
    setTimeout(() => loadPrompts(), 1500);
  } catch(e) {
    showStatus("Erro ao salvar. Tente novamente.", "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Salvar Prompt";
  }
}

async function deletePrompt(id) {
  const p = prompts.find(x => x.uid === id);
  if (!p) return;
  if (!confirm(`Remover o prompt "${p.title}"?`)) return;

  showStatus("Removendo prompt...", "loading");
  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "delete", id: p.uid })
    });
    showStatus("Prompt removido! Atualizando lista...", "loading");
    setTimeout(() => loadPrompts(), 1500);
  } catch(e) {
    showStatus("Erro ao remover. Tente novamente.", "error");
  }
}

function escHtml(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

loadPrompts();
</script>
</body>
</html>
